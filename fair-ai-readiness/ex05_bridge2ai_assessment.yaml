dimension_1_findability:
  label: "Findability"
  fair_principles: ["F1", "F2", "F3", "F4"]
  bridge2ai_dimension: "D1"
  criteria:
    - id: F-01
      label: "Globally unique PID assigned"
      description: "Dataset has a globally unique, persistent, machine-resolvable identifier."
      source: "FAIRSCAPE C-01; FAIR F1"
      status: YES
      notes: "DOI assigned: 10.5281/zenodo.99999901"

    - id: F-02
      label: "Rich, structured metadata in searchable index"
      description: "Dataset metadata is indexed in a searchable registry."
      source: "FAIRSCAPE C-02; FAIR F2"
      status: YES
      notes: "Indexed in Zenodo with full DCAT metadata."

    - id: F-03
      label: "Metadata includes dataset identifier"
      description: "Metadata record explicitly references the dataset PID."
      source: "FAIR F3"
      status: YES
      notes: "dct:identifier present in metadata."

    - id: F-04
      label: "Keywords from controlled vocabulary"
      description: "At least one keyword from a controlled vocabulary."
      source: "FAIR F2; Bioschemas Dataset 1.1"
      status: PARTIAL
      notes: "Keywords present but as free-text strings; not yet mapped to MeSH/EDAM IRIs."

dimension_2_accessibility:
  label: "Accessibility"
  fair_principles: ["A1", "A1.1", "A1.2", "A2"]
  bridge2ai_dimension: "D2"
  criteria:
    - id: A-01
      label: "Data retrievable by PID using open protocol"
      description: "Dataset downloadable via standard open protocol."
      source: "FAIRSCAPE C-04; FAIR A1.1"
      status: YES
      notes: "HTTPS download URL specified."

    - id: A-02
      label: "Authentication/authorisation documented"
      description: "Access conditions documented."
      source: "FAIR A1.2"
      status: PARTIAL
      notes: "IRB approval noted but specific access protocol not spelled out."

    - id: A-03
      label: "Metadata persists even if data unavailable"
      description: "Metadata record will remain accessible."
      source: "FAIR A2"
      status: YES
      notes: "Zenodo guarantees metadata persistence."

    - id: A-04
      label: "License clearly stated"
      description: "Explicit, machine-readable license IRI attached."
      source: "FAIR R1.1; Bridge2AI D2; FAIRSCAPE C-05"
      status: YES
      notes: "CC-BY 4.0 IRI in dct:license."

dimension_3_characterisation:
  label: "Characterisation"
  fair_principles: ["I1", "I2", "F2"]
  bridge2ai_dimension: "D3"
  criteria:
    - id: C-01
      label: "Variables/features listed with definitions"
      description: "All measured variables/features listed."
      source: "FAIRSCAPE C-08; Bridge2AI D3; Bioschemas Dataset 1.1"
      status: YES
      notes: "schema:variableMeasured lists 5 variables."

    - id: C-02
      label: "Data types and formats specified"
      description: "File format(s) and MIME types documented."
      source: "FAIRSCAPE C-06; AnIML arXiv:2604.01728"
      status: YES
      notes: "ZIP distribution with MIME type specified."

    - id: C-03
      label: "Statistical summary / quality metrics provided"
      description: "Dataset carries summary statistics."
      source: "FAIRSCAPE C-07; Bridge2AI D3"
      status: NO
      notes: "No statistical summary in this metadata record. TODO: add dqv:QualityMeasurement."

    - id: C-04
      label: "Known biases and limitations documented"
      description: "Known data quality issues and biases documented."
      source: "FAIRSCAPE C-10; arXiv:2508.21774"
      status: NO
      notes: "No bias statement in current record. TODO: add dct:rights extension or dedicated bias note."

    - id: C-05
      label: "Version and provenance of reference ontologies/vocabularies"
      description: "Ontology versions recorded for all annotations."
      source: "FAIRSCAPE C-11; Tan et al. arXiv:2405.05413"
      status: PARTIAL
      notes: "OMOP CDM referenced but no version IRI. MeSH term used without version."

