      label: "Creation workflow documented (WRROC/PROV-O)"
      description: "Computational workflow generating the dataset recorded using PROV-O."
      source: "FAIRSCAPE C-09; Leo et al. 2024 DOI:10.1371/journal.pone.0309210"
      status: YES
      notes: "prov:wasDerivedFrom references upstream dataset IRI."

    - id: P-02
      label: "Software versions and containers recorded"
      description: "Tool names, versions, and containers recorded."
      source: "FAIRSCAPE C-12; yProv4ML arXiv:2507.01075"
      status: NO
      notes: "No software/container provenance in current record."

    - id: P-03
      label: "Input datasets and parameters logged"
      description: "All upstream datasets and pipeline parameters linked."
      source: "FAIRSCAPE C-13; WRROC"
      status: PARTIAL
      notes: "prov:wasDerivedFrom links upstream dataset but no parameter record."

    - id: P-04
      label: "Provenance is machine-readable (RDF/JSON-LD)"
      description: "Provenance in machine-readable serialisation."
      source: "FAIRSCAPE C-14; RO-Crate 1.1"
      status: YES
      notes: "Full PROV-O Turtle provided."

    - id: P-05
      label: "Execution environment reproducible"
      description: "Reproducible environment specification exists."
      source: "FAIRSCAPE C-15"
      status: NO
      notes: "No environment specification file. TODO: add Dockerfile or conda env."

