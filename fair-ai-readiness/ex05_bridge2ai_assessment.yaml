      status: NO
      notes: "Use restrictions in prose only. TODO: add GA4GH DUO terms (HMB, DS)."

dimension_6_standards:
  label: "Interoperability & Standards"
  fair_principles: ["I1", "I2", "I3"]
  bridge2ai_dimension: "D6"
  criteria:
    - id: I-01
      label: "Metadata uses formal, shared knowledge representation"
      description: "Metadata expressed in formal RDF-based language."
      source: "FAIR I1; FAIRSCAPE C-19"
      status: YES
      notes: "DCAT 3 + PROV-O + schema.org Turtle."

    - id: I-02
      label: "Cross-references to related datasets/resources"
      description: "Links to related datasets and publications."
      source: "FAIR I3; FAIRSCAPE C-20"
      status: YES
      notes: "prov:wasDerivedFrom and dct:conformsTo links present."

    - id: I-03
