      source: "Bridge2AI D5; FAIRSCAPE C-16"
      status: YES
      notes: "dct:rights states IRB approval and written informed consent."

    - id: E-02
      label: "De-identification method stated"
      description: "De-identification standard applied documented."
      source: "Bridge2AI D5; FAIRSCAPE C-17"
      status: YES
      notes: "HIPAA Safe Harbor method stated in dct:rights."

    - id: E-03
      label: "Data use restrictions machine-readable"
      description: "Data use conditions encoded in machine-readable format."
